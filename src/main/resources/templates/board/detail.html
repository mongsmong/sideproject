<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: head('게시글 상세')}"></head>

<body>
    <header th:replace="~{fragments/common :: header}"></header>

    <main class="container">

        <!-- 프로필 카드 -->
        <a th:href="@{/account/profile/{username}(username=${board.writerUsername})}" class="writer-card-link">
            <div class="writer-card">
                <img th:if="${board.writerProfileImageUrl != null}" th:src="${board.writerProfileImageUrl}"
                    class="writer-card-img">
                <div th:unless="${board.writerProfileImageUrl != null}" class="writer-card-placeholder"
                    th:text="${#strings.substring(board.writerNickname, 0, 1)}"></div>

                <div class="writer-card-info">
                    <div class="writer-card-nickname" th:text="${board.writerNickname}"></div>
                    <div class="writer-card-stat">완료된 작업: <strong th:text="${completedCount}"></strong>건</div>
                </div>
            </div>
        </a>



        <div class="detail-card">
            <div class="detail-header">
                <span class="category-badge" th:text="${board.category}"></span>
                <h2 th:text="${board.title}"></h2>
                <div class="price-box">
                    <span th:text="${board.basePrice}"></span>원
                </div>

                <div class="detail-hashtag-list" th:if="${board.hashtag != null and !board.hashtag.isEmpty()}">
                    <span th:each="tag : ${#strings.arraySplit(board.hashtag, ' ')}" 　th:if="${!tag.isEmpty()}"
                        　th:text="'#' + ${tag}" class="hashtag-item small"></span>
                </div>
            </div>

            <div th:if="${board.files != null and !board.files.isEmpty()}" class="gallery-card">
                <div class="gallery-viewport" id="galleryViewport">
                    <div class="gallery-track" id="galleryTrack">
                        <div th:each="file, iter : ${board.files}" class="gallery-slide">
                            <img th:if="${file.contentType != null and file.contentType.startsWith('image')}"
                                th:src="${file.filePath}" class="gallery-media">
                            <video th:if="${file.contentType != null and file.contentType.startsWith('video')}"
                                th:src="${file.filePath}" controls class="gallery-media"></video>
                        </div>
                    </div>
                </div>

                <button type="button" class="gallery-nav gallery-prev" onclick="galleryMove(-1)">‹</button>
                <button type="button" class="gallery-nav gallery-next" onclick="galleryMove(1)">›</button>

                <div class="gallery-dots" id="galleryDots">
                    <span th:each="file, iter : ${board.files}" class="gallery-dot"
                        th:classappend="${iter.index == 0} ? ' active' : ''"
                        th:onclick="|galleryGoTo(${iter.index})|"></span>
                </div>
            </div>

            <div class="detail-body">
                <h4>작업 설명</h4>
                <div class="content-box" th:text="${board.content}"></div>
            </div>

            <div class="button-group">
                <th:block sec:authorize="isAuthenticated() and hasRole('ROLE_CLIENT')">
                    <a th:if="${#authentication.name != board.writerUsername and board.postStatus != 'OFF' and !slotFull}"
                        th:href="@{/order/create/{id}(id=${board.boardId})}" class="btn-blue">
                        신청하기
                    </a>
                    <span class="tooltip-wrap"
                        th:if="${#authentication.name != board.writerUsername and (board.postStatus == 'OFF' or slotFull)}">
                        <a class="btn-blue btn-disabled-link">신청하기</a>
                        <span class="tooltip-text"
                            th:text="${board.postStatus == 'OFF'} ? '마감된 게시글입니다.' : '작가의 작업 슬롯이 가득 찼습니다.'"></span>
                    </span>
                </th:block>
                <a th:href="@{/board/list}" class="btn-gray">목록으로</a>
            </div>
        </div>

        <div th:if="${hasCompletedOrder}">
            <a th:href="@{/review/register/{boardId}(boardId=${board.boardId})}" class="btn-review">리뷰 작성하기</a>
        </div>

        <!-- 리뷰란 -->
        <div th:if="${reviews != null and !reviews.isEmpty()}" class="review-list-card">
            <h4>리뷰 <span th:text="'(' + ${reviews.size()} + ')'"></span></h4>

            <div th:each="review : ${reviews}" class="review-item">
                <div class="review-item-header">
                    <img th:if="${review.buyerProfileImageUrl != null}" th:src="${review.buyerProfileImageUrl}"
                        class="review-profile-img">
                    <div th:unless="${review.buyerProfileImageUrl != null}" class="review-profile-placeholder"
                        th:text="${#strings.substring(review.buyerNickname, 0, 1)}"></div>

                    <span class="review-nickname" th:text="${review.buyerNickname}"></span>

                    <span class="review-stars">
                        <span th:each="i : ${#numbers.sequence(1, 5)}"
                            th:text="${i <= review.rating} ? '★' : '☆'"></span>
                    </span>

                    <span class="review-date" th:text="${#temporals.format(review.regDate, 'yyyy-MM-dd')}"></span>
                </div>

                <p class="review-content" th:text="${review.content}"></p>
            </div>
        </div>

        <div th:if="${reviews == null or reviews.isEmpty()}" class="review-list-card">
            <h4>리뷰 <span>(0)</span></h4>
            <p class="notice-text" style="text-align:center; margin: 10px 0 0;">
                아직 작성된 리뷰가 없습니다.
            </p>
        </div>
    </main>

    <script>
        let galleryIndex = 0;

        function galleryMove(direction) {
            const track = document.getElementById('galleryTrack');
            const slideCount = track.children.length;
            galleryIndex = (galleryIndex + direction + slideCount) % slideCount;
            updateGallery();
        }

        function galleryGoTo(index) {
            galleryIndex = index;
            updateGallery();
        }

        function updateGallery() {
            const track = document.getElementById('galleryTrack');
            track.style.transform = `translateX(-${galleryIndex * 100}%)`;

            document.querySelectorAll('.gallery-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === galleryIndex);
            });
        }
    </script>

    <footer th:replace="~{fragments/common :: footer}"></footer>
</body>

</html>
