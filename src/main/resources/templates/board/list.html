<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/common :: head('게시글 목록')}"></head>

<body>
    <header th:replace="~{fragments/common :: header}"></header>

    <!-- 검색 및 카테고리 필터 영역 -->
    <div class="search-wrap">
        <form th:action="@{/board/list}" method="get" class="search-form">

            <select name="category" class="category-select">
                <option value="" th:selected="${param.category == null or param.category == ''}">전체 카테고리</option>
                <option value="디자인" th:selected="${param.category != null and param.category.toString() == '디자인'}">디자인
                </option>
                <option value="일러스트" th:selected="${param.category != null and param.category.toString() == '일러스트'}">
                    일러스트</option>
                <option value="영상" th:selected="${param.category != null and param.category.toString() == '영상'}">영상
                </option>
                <option value="구해요" th:selected="${param.category != null and param.category.toString() == '구해요'}">구해요
                </option>
            </select>

            <div class="input-box">
                <input type="text" name="keyword" placeholder="검색어를 입력하세요." th:value="${param.keyword}"
                    class="search-input">

                <!-- 현재 선택된 해시태그를 검색 시에도 유지 -->
                <input type="hidden" name="hashtag" th:value="${param.hashtag}">

                <button type="submit" class="search-btn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </form>
    </div>

    <div class="popular-hashtags-wrap">
        <div class="hashtag-title"></div>
        <div class="hashtag-list">
            <a th:each="tag : ${popularTags}"
                th:href="@{/board/list(category=${param.category}, keyword=${param.keyword}, hashtag=${tag})}"
                th:text="'#' + ${tag}"
                th:classappend="${selectedHashtag != null and selectedHashtag == tag} ? ' active' : ''"
                class="hashtag-item">
            </a>

            <!-- 선택 해제 버튼: 해시태그가 선택된 상태일 때만 노출 -->
            <a th:if="${selectedHashtag != null and !selectedHashtag.isEmpty()}"
                th:href="@{/board/list(category=${param.category}, keyword=${param.keyword})}"
                class="hashtag-item hashtag-clear">
            </a>
        </div>
    </div>




    <main class="container">
        <div class="board-top-bar">
            <h3>의뢰 게시판</h3>
            <a sec:authorize="hasRole('CLIENT')" th:href="@{/board/register}" class="btn-write">게시글 작성</a>
        </div>

        <div class="board-grid">
            <a th:each="board : ${boards.content}" th:href="@{/board/detail/{id}(id=${board.boardId})}"
                class="board-card">

                <div class="card-img">
                    <img src="https://placehold.co/300x200?text=No+Image" alt="썸네일">
                    <span th:if="${board.postStatus == 'OFF'}" class="closed-badge">마감</span>
                </div>

                <div class="card-info">
                    <h4 class="title" th:text="${board.title}"></h4>

                    <div class="sub-info">
                        <span class="price" th:text="${board.basePrice} + '원'"></span>
                        <span class="category" th:text="${board.category}"></span>
                    </div>

                    <div class="hashtag">
                        <span th:each="tag : ${#strings.arraySplit(board.hashtag, ' ')}" 
                            　th:if="${!tag.isEmpty()}"
                           　 th:text="'#' + ${tag}" 
                           　class="hashtag-item small"></span>
                    </div>

                    <div class="writer" th:text="${board.writerNickname}"></div>
                </div>
            </a>
        </div>

        <div th:if="${boards.totalPages > 0}" class="pagination-wrap">
            <ul class="pagination">
                <li th:if="${boards.hasPrevious()}">
                    <a th:href="@{/board/list(page=${boards.number - 1})}">이전</a>
                </li>

                <li th:each="i : ${#numbers.sequence(0, boards.totalPages - 1)}">
                    <a th:href="@{/board/list(page=${i})}" th:text="${i + 1}"
                        th:class="${boards.number == i ? 'active' : ''}"></a>
                </li>

                <li th:if="${boards.hasNext()}">
                    <a th:href="@{/board/list(page=${boards.number + 1})}">다음</a>
                </li>
            </ul>
        </div>
    </main>

    <footer th:replace="~{fragments/common :: footer}"></footer>
</body>


</html>
