<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: head('게시글 수정')}"></head>

<body>
    <header th:replace="~{fragments/common :: header}"></header>

    <main class="container">
        <div class="form-card">
            <div class="form-header">
                <h3>게시글 수정</h3>
            </div>

            <form th:action="@{|/board/edit/${board.boardId}|}" method="post" class="styled-form"
                enctype="multipart/form-data">

                <div class="form-group">
                    <label>제목</label>
                    <input type="text" name="title" th:value="${board.title}" placeholder="게시글 제목을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label>카테고리</label>
                    <select name="category">
                        <option value="디자인" th:selected="${board.category == '디자인'}">디자인</option>
                        <option value="일러스트" th:selected="${board.category == '일러스트'}">일러스트</option>
                        <option value="영상" th:selected="${board.category == '영상'}">영상</option>
                        <option value="음향" th:selected="${board.category == '음향'}">음향</option>
                        <option value="기타" th:selected="${board.category == '기타'}">기타</option>
                        <option value="구해요" th:selected="${board.category == '구해요'}">구해요</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>샘플 이미지/영상 첨부</label>
                    <input type="file" id="fileInput" multiple accept="image/*,video/*" style="display:none;">
                    <button type="button" class="btn-sub" onclick="document.getElementById('fileInput').click()">
                        + 파일 선택
                    </button>
                    <div id="fileList" class="file-preview-list"></div>
                </div>

                <div class="form-group">
                    <label>기본 가격 (원)</label>
                    <input type="number" name="basePrice" th:value="${board.basePrice}" placeholder="예: 50000" required>
                </div>

                <div class="form-group">
                    <label>해시태그</label>
                    <input type="text" name="hashtag" th:value="${board.hashtag}" placeholder="#캐릭터 #일러스트 (공백으로 구분)">
                </div>

                <div class="form-group">
                    <label>게시글 상세 내용</label>
                    <textarea name="content" placeholder="게시글에 대한 설명을 적으세요" required
                        th:text="${board.content}"></textarea>
                </div>

                <div class="action-btn-row">
                    <button type="submit" class="btn-submit-action">수정 완료</button>
                    <button type="button" class="btn-cancel"
                        th:onclick="|location.href='@{/account/profile/{username}(username=${board.writerUsername})}'|">취소</button>
                </div>
            </form>
        </div>
    </main>
    <script>
        let selectedFiles = [];

        document.getElementById('fileInput').addEventListener('change', function (e) {
            for (const file of e.target.files) {
                selectedFiles.push(file);
            }
            renderFileList();
            e.target.value = '';
        });

        function renderFileList() {
            const listEl = document.getElementById('fileList');
            listEl.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-preview-item';
                item.innerHTML = `
                <span class="file-preview-name">${file.name}</span>
                <button type="button" class="file-preview-remove" data-index="${index}">×</button>
            `;
                listEl.appendChild(item);
            });

            listEl.querySelectorAll('.file-preview-remove').forEach(btn => {
                btn.addEventListener('click', function () {
                    selectedFiles.splice(Number(this.dataset.index), 1);
                    renderFileList();
                });
            });
        }

        document.querySelector('form[action*="/board/edit/"]').addEventListener('submit', function (e) {
            const dataTransfer = new DataTransfer();
            selectedFiles.forEach(file => dataTransfer.items.add(file));

            const hiddenInput = document.createElement('input');
            hiddenInput.type = 'file';
            hiddenInput.name = 'attachments';
            hiddenInput.multiple = true;
            hiddenInput.style.display = 'none';
            hiddenInput.files = dataTransfer.files;

            this.appendChild(hiddenInput);
        });
    </script>
    <footer th:replace="~{fragments/common :: footer}"></footer>
</body>

</html>
