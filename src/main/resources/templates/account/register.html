<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>
    <div th:if="${msg}" th:text="${msg}" style="color: blue;"></div>
    
    <h1>회원가입</h1>
    <form th:action="@{/account/register}" method="post">
        <div>
            <label>아이디:</label>
            <input type="text" name="username" required>
        </div>
        <div>
            <label>비밀번호:</label>
            <input type="password" name="password" required>
        </div>
        <div>
            <label>닉네임:</label>
            <input type="text" name="nickname" required>
        </div>
        <div>
            <label>이메일:</label>
            <input type="email" name="email" required>
        </div>
        <input type="hidden" name="role" value="ROLE_CLIENT">

        <button type="submit">가입하기</button>
    </form>
    <a th:href="@{/auth/login}">로그인 페이지로</a>
</body>
</html>
