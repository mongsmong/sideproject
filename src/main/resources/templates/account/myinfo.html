<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('내 정보 수정')}"></head>
<body>
    <header th:replace="~{fragments/common :: header}"></header>

    <main class="container">
        <div class="info-card">
            <div class="info-header">
                <h3>내 정보 수정</h3>
            </div>

            <div class="info-body">
                <div th:if="${msg}" class="notice-text" th:text="${msg}" style="margin-bottom: 12px;"></div>

                <div class="profile-image-wrap">
                    <img th:if="${account.profileImageUrl != null}" th:src="${account.profileImageUrl}"
                        class="profile-image-preview" id="profilePreview">
                    <div th:unless="${account.profileImageUrl != null}" class="profile-image-placeholder"
                        id="profilePreview">
                        <span th:text="${#strings.substring(account.nickname, 0, 1)}"></span>
                    </div>
                </div>

                <form th:action="@{/account/mypage/info}" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>프로필 사진</label>
                        <input type="file" name="profileImage" accept="image/*"
                            onchange="previewImage(this)">
                    </div>

                    <div class="form-group">
                        <label>아이디</label>
                        <input type="text" th:value="${account.username}" disabled>
                    </div>

                    <div class="form-group">
                        <label>닉네임</label>
                        <input type="text" name="nickname" th:value="${account.nickname}" required maxlength="20">
                    </div>

                    <div class="form-group">
                        <label>이메일</label>
                        <input type="email" name="email" th:value="${account.email}" required>
                    </div>

                    <div class="action-btn-row">
                        <button type="submit" class="btn-primary">저장하기</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/common :: footer}"></footer>

    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const preview = document.getElementById('profilePreview');
                    preview.outerHTML = `<img src="${e.target.result}" class="profile-image-preview" id="profilePreview">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
