<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: head('의뢰서 확인')}"></head>

<body>
    <header th:replace="~{fragments/common :: header}"></header>

    <main class="container">
        <div class="info-card">
            <div class="info-header">
                <h3>작업 의뢰서</h3>
                <span class="status-badge" th:text="${order.orderStatus}"></span>
            </div>

            <div class="info-body">
                <div class="info-row">
                    <span class="label">주문 번호</span>
                    <span class="value" th:text="${order.orderId}"></span>
                </div>
                <div class="info-row">
                    <span class="label">게시글 제목</span>
                    <span class="value" th:text="${order.boardTitle}"></span>
                </div>
                <div class="info-row">
                    <span class="label">구매자</span>
                    <span class="value" style="display:flex; align-items:center; gap:6px;">
                        <img th:if="${order.buyerProfileImageUrl != null}" th:src="${order.buyerProfileImageUrl}"
                            class="info-profile-img">
                        <span th:text="${order.buyerNickname}"></span>
                    </span>
                </div>

                <div class="req-box">
                    <div class="label-title">상세 요구사항</div>
                    <div class="req-content" th:text="${order.content}"></div>
                </div>

                <!-- 작가 화면: 결제 요청 / 의뢰 거절 -->
                <div th:if="${isWriter and !order.orderStatus.trim().equals('CANCELED')}" class="action-section">

                    <form th:action="@{|/order/confirm/${order.orderId}|}" method="post">
                        <div class="form-group">
                            <label>작업물 제목</label>
                            <input type="text" name="orderTitle" th:value="${order.orderTitle}"
                                th:disabled="${order.orderStatus.trim().equals('PROCESSING')}"
                                th:placeholder="${order.boardTitle}" maxlength="100">
                        </div>

                        <div class="form-group">
                            <label>최종 제시 금액</label>
                            <input type="number" name="totalPrice" th:value="${order.totalPrice}"
                                th:disabled="${!order.orderStatus.trim().equals('REQUEST')}" required>
                        </div>

                        <div class="form-group">
                            <label>최종 마감일</label>
                            <input type="date" name="deadline" th:value="${order.deadline}"
                                th:disabled="${!order.orderStatus.trim().equals('REQUEST')}" required>
                        </div>

                        <div class="action-btn-row">
                            <button type="submit" class="btn-primary"
                                th:disabled="${!order.orderStatus.trim().equals('REQUEST')}"
                                th:classappend="${order.orderStatus.trim().equals('REQUEST')} ? '' : 'btn-disabled'">
                                <span th:if="${order.orderStatus.trim().equals('REQUEST')}">결제 요청</span>
                                <span th:if="${order.orderStatus.trim().equals('PAYMENT_WAITING')}">요청 완료</span>
                                <span th:if="${order.orderStatus.trim().equals('PROCESSING')}">결제 완료</span>
                            </button>
                        </div>
                    </form>

                    <form th:action="@{|/order/cancel/${order.orderId}|}" method="post"
                        onsubmit="return confirm('정말 이 의뢰를 거절하시겠습니까?');" class="action-btn-row">
                        <button type="submit" class="btn-sub"
                            th:disabled="${order.orderStatus.trim().equals('PROCESSING')}"
                            th:classappend="${order.orderStatus.trim().equals('PROCESSING')} ? 'btn-disabled' : ''">
                            의뢰 거절
                        </button>
                    </form>
                </div>

                <!-- 의뢰인 화면: 결제하기 / 신청 취소 -->
                <div th:if="${isBuyer and (order.orderStatus.trim().equals('PAYMENT_WAITING') or order.orderStatus.trim().equals('PROCESSING'))}"
                    class="action-section">
                    <div class="info-row">
                        <span class="label">결제 금액</span>
                        <span class="value" th:text="${order.totalPrice} + '원'"></span>
                    </div>

                    <div class="action-btn-row">
                        <button type="button" class="btn-primary"
                            th:disabled="${order.orderStatus.trim().equals('PROCESSING')}"
                            th:classappend="${order.orderStatus.trim().equals('PROCESSING')} ? 'btn-disabled' : ''"
                            th:onclick="${order.orderStatus.trim().equals('PROCESSING')} ? '' : ('requestPayment(' + ${order.orderId} + ', ' + ${order.chatRoomId} + ')')">
                            <span th:if="${order.orderStatus.trim().equals('PAYMENT_WAITING')}">결제하기</span>
                            <span th:if="${order.orderStatus.trim().equals('PROCESSING')}">결제 완료</span>
                        </button>

                        <form th:action="@{|/order/cancel/${order.orderId}|}" method="post"
                            onsubmit="return confirm('정말 이 신청을 취소하시겠습니까?');">
                            <button type="submit" class="btn-sub"
                                th:disabled="${order.orderStatus.trim().equals('PROCESSING')}"
                                th:classappend="${order.orderStatus.trim().equals('PROCESSING')} ? 'btn-disabled' : ''">
                                신청 취소
                            </button>
                        </form>
                    </div>
                </div>
            </div>


            <div class="timeline-wrap">
                <div class="label-title">진행 타임라인</div>

                <div class="timeline">
                    <div th:each="msg : ${messages}"
                        th:if="${msg.messageType != null and !msg.messageType.trim().equals('TALK')}"
                        class="timeline-item">

                        <div class="timeline-dot" th:classappend="${
                msg.messageType.trim().equals('CANCELED')} ? 'dot-red' :
                (${msg.messageType.trim().equals('PAID')} ? 'dot-green' : 'dot-purple')">
                        </div>

                        <div class="timeline-content">
                            <div class="timeline-label">
                                <span th:if="${msg.messageType.trim().equals('NEW_REQUEST')}">의뢰 신청</span>
                                <span th:if="${msg.messageType.trim().equals('PAY_REQUEST')}">결제 요청</span>
                                <span th:if="${msg.messageType.trim().equals('PAID')}">결제 완료</span>
                                <span th:if="${msg.messageType.trim().equals('SUBMIT')}">작업물 제출</span>
                                <span th:if="${msg.messageType.trim().equals('CANCELED')}">취소됨</span>
                                <span th:if="${msg.messageType.trim().equals('REVISION_REQUEST')}">수정 요청</span>
                            </div>

                            <p class="timeline-text" th:text="${msg.content}"
                                th:unless="${msg.messageType.trim().equals('SUBMIT')}"></p>
                            <!-- 작성자 작성 박스 -->
                            <div th:if="${msg.messageType.trim().equals('SUBMIT')}" class="req-box"
                                style="margin-top: 6px;">
                                <div class="req-content" th:text="${msg.content}"></div>
                            </div>
                            <!-- 첨부파일 박스 -->
                            <div th:if="${msg.messageType.trim().equals('SUBMIT') and msg.files != null and !msg.files.isEmpty()}"
                                class="req-box file-box" style="margin-top: 8px;">
                                <div th:each="file : ${msg.files}" class="file-item">
                                    <span class="file-icon">🔗</span>
                                    <a th:href="${file.filePath}" th:text="${file.originalName}" target="_blank"></a>
                                </div>
                            </div>
                            <p class="timeline-time" th:text="${#temporals.format(msg.regDate, 'yyyy-MM-dd HH:mm')}">
                            </p>
                        </div>
                    </div>

                    <!-- 최종 확인(승인/수정요청): SUBMITTED일 때 -->
                    <div th:if="${order.orderStatus.trim().equals('SUBMITTED')}" class="timeline-item">
                        <div class="timeline-dot dot-pending"></div>
                        <div class="timeline-content">
                            <div class="timeline-label">최종 확인</div>

                            <div th:if="${isBuyer}">
                                <p class="timeline-text">작업물을 확인하고 승인하거나 수정을 요청해주세요.</p>
                                <div class="action-btn-row">
                                    <form th:action="@{|/order/approve/${order.orderId}|}" method="post"
                                        onsubmit="return confirm('작업물을 승인하시겠습니까? 승인 후에는 되돌릴 수 없습니다.');">
                                        <button type="submit" class="btn-notice-action">최종 승인</button>
                                    </form>
                                    <button type="button" class="btn-sub"
                                        onclick="document.getElementById('revisionForm').style.display='block'">수정
                                        요청</button>
                                </div>
                                <form id="revisionForm" th:action="@{|/order/revision/${order.orderId}|}" method="post"
                                    class="revision-form">
                                    <textarea name="content" required placeholder="수정이 필요한 부분을 남겨주세요."
                                        class="revision-textarea"></textarea>
                                    <button type="submit" class="btn-sub revision-submit-btn">수정 요청 보내기</button>
                                </form>
                            </div>

                            <div th:if="${isWriter}">
                                <p class="timeline-text">의뢰인의 최종 확인을 기다리는 중입니다.</p>
                                <button type="button" class="btn-notice-action btn-disabled" disabled>확인 대기중</button>
                            </div>
                        </div>
                    </div>

                    <!-- 수정 작업중: REVISION_REQUESTED일 때 -->
                    <div th:if="${order.orderStatus.trim().equals('REVISION_REQUESTED')}" class="timeline-item">
                        <div class="timeline-dot dot-pending"></div>
                        <div class="timeline-content">
                            <div class="timeline-label">수정 작업중</div>
                            <p class="timeline-text" th:if="${isWriter}">의뢰인의 수정 요청을 반영해 재제출해주세요.</p>
                            <p class="timeline-text" th:if="${isBuyer}">작가가 수정 작업을 진행 중입니다.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button type="button" class="btn-sub"
                th:onclick="|location.href='@{/order/detail/{id}(id=${order.chatRoomId})}'|">
                소통창으로 돌아가기
            </button>
        </div>

        <!-- 파일 첨부 제출 폼 -->
        <div th:if="${isWriter and (order.orderStatus.trim().equals('PROCESSING') or order.orderStatus.trim().equals('REVISION_REQUESTED'))}"
            class="action-section">
            <form th:action="@{|/order/submit/${order.orderId}|}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label>작업물 설명</label>
                    <textarea name="content" required placeholder="완성된 작업물에 대한 설명을 남겨주세요."></textarea>
                </div>
                <div class="form-group">
                    <label>파일 첨부</label>
                    <input type="file" id="fileInput" multiple style="display:none;">
                    <button type="button" class="btn-sub" onclick="document.getElementById('fileInput').click()">
                        + 파일 선택
                    </button>
                    <div id="fileList" class="file-preview-list"></div>
                </div>
                <div class="action-btn-row">
                    <button type="submit" class="btn-primary">작업물 제출</button>
                </div>
            </form>
        </div>





        <script>
            async function requestPayment(orderId, chatRoomId) {
                try {
                    const res = await fetch(`/payment/prepare/${orderId}`, { method: "POST" });
                    const data = await res.json();

                    IMP.init("imp14868341");

                    IMP.request_pay({
                        channelKey: "channel-key-58eadec0-e9e8-4529-809d-fa40f983b00a",
                        pay_method: "card",
                        merchant_uid: data.merchantUid,
                        name: "작업 의뢰 결제",
                        amount: data.amount,
                    }, async function (rsp) {
                        if (rsp.success) {
                            const verifyRes = await fetch("/payment/verify", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    imp_uid: rsp.imp_uid,
                                    merchant_uid: rsp.merchant_uid
                                })
                            });

                            if (verifyRes.ok) {
                                alert("결제가 완료되었습니다!");
                                location.href = `/order/detail/${chatRoomId}`;   // ← 여기 orderId를 chatRoomId로 변경
                            } else {
                                alert("결제 검증 실패");
                            }
                        } else {
                            alert("결제 실패: " + rsp.error_msg);
                        }
                    });
                } catch (error) {
                    console.error("결제 진행 중 오류 발생:", error);
                    alert("결제 요청 중 문제가 발생했습니다.");
                }
            }



            // 첨부파일 중복 등록 / 취소 로직
            let selectedFiles = [];

            const fileInputEl = document.getElementById('fileInput');
            if (fileInputEl) {
                fileInputEl.addEventListener('change', function (e) {
                    for (const file of e.target.files) {
                        selectedFiles.push(file);
                    }
                    renderFileList();
                    e.target.value = '';
                });
            }

            function renderFileList() {
                const listEl = document.getElementById('fileList');
                listEl.innerHTML = '';
                selectedFiles.forEach((file, index) => {
                    const item = document.createElement('div');
                    item.className = 'file-preview-item';
                    item.innerHTML = `
            <span class="file-preview-name">${file.name}</span>
            <button type="button" class="file-preview-remove" data-index="${index}">×</button>
        `;
                    listEl.appendChild(item);
                });

                // X 버튼 클릭 시 해당 파일 제거
                listEl.querySelectorAll('.file-preview-remove').forEach(btn => {
                    btn.addEventListener('click', function () {
                        selectedFiles.splice(Number(this.dataset.index), 1);
                        renderFileList();
                    });
                });
            }

            // 폼 제출 직전, selectedFiles를 실제 input에 채워넣기
            const submitForm = document.querySelector('form[action*="/order/submit/"]');
            if (submitForm) {
                submitForm.addEventListener('submit', function (e) {
                    const dataTransfer = new DataTransfer();
                    selectedFiles.forEach(file => dataTransfer.items.add(file));

                    const hiddenInput = document.createElement('input');
                    hiddenInput.type = 'file';
                    hiddenInput.name = 'files';
                    hiddenInput.multiple = true;
                    hiddenInput.style.display = 'none';
                    hiddenInput.files = dataTransfer.files;

                    submitForm.appendChild(hiddenInput);
                });
            }
        </script>
    </main>

    <footer th:replace="~{fragments/common :: footer}"></footer>
</body>

</html>
