<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<style>
    html,
    body {
        height: 100%;
        margin: 0;
        overflow: hidden;
    }

    body {
        display: flex;
        flex-direction: column;
        align-items: stretch;
    }

    .chat-page-main {
        max-width: none;
        width: 70%;
        margin: 0 auto;
    }

    .chat-page-main .chat-bg {
        flex: 1;
        min-height: 0;
    }

    .chat-page-main .send-bar {
        flex-shrink: 0;
    }

    .site-footer {
        flex-shrink: 0;
        width: 100%;
    }
</style>

<head
    th:replace="~{fragments/common :: head(${currentUsername == room.buyerUsername ? '작가' : room.buyerNickname} + '님과의 메시지')}">
</head>

<body>
    <header th:replace="~{fragments/common :: header}"></header>

    <main class="container chat-page-main">
        <div style="margin-bottom: 15px; font-weight: bold; font-size: 1.1rem;">
            <span th:if="${isBuyer}" th:text="${room.boardWriterUsername}"></span>
            <span th:if="${isWriter}" th:text="${room.buyerNickname}"></span>
            님과의 메시지
        </div>

        <div class="chat-bg">
            <div th:unless="${#lists.isEmpty(messages)}" th:each="msg : ${messages}"
                th:class="${msg.senderUsername == currentUsername ? 'msg-row my' : 'msg-row other'}">

                <div th:if="${msg.senderUsername != currentUsername}" class="sender-name">
                    <img th:if="${msg.senderProfileImageUrl != null}" th:src="${msg.senderProfileImageUrl}"
                        class="chat-profile-img">
                    <span th:text="${msg.senderNickname}"></span>
                </div>

                <div class="bubble-box">
                    <span th:if="${msg.senderUsername == currentUsername}" class="time"
                        th:text="${#temporals.format(msg.regDate, 'HH:mm')}"></span>

                    <!-- 신규 신청 -->
                    <div th:if="${msg.messageType != null and msg.messageType.trim().equals('NEW_REQUEST')}"
                        class="bubble bubble-card">
                        <p class="pay-card-title">
                            <span th:text="${msg.senderNickname}"></span>님에게서 새로운 의뢰가 도착했습니다.
                        </p>
                        <button type="button" class="btn-notice-action"
                            th:onclick="|location.href='@{/order/info/{id}(id=${msg.orderId})}'|">
                            의뢰서 상세
                        </button>
                    </div>

                    <!-- 결제 요청 -->
                    <div th:if="${msg.messageType != null and msg.messageType.trim().equals('PAY_REQUEST')}"
                        class="bubble bubble-card">
                        <p class="pay-card-title">
                            <span class="pay-card-title-ellipsis" th:text="${msg.orderTitle}"></span>에 대한 결제 요청이
                            도착했습니다.
                        </p>
                        <p class="pay-card-amount">
                            <span th:text="${#numbers.formatInteger(msg.totalPrice, 0, 'COMMA')}"></span>원
                        </p>
                        <button type="button" class="btn-notice-action"
                            th:onclick="|location.href='@{/order/info/{id}(id=${msg.orderId})}'|">
                            의뢰서 상세
                        </button>
                    </div>

                    <!-- 결제 완료 -->
                    <div th:if="${msg.messageType != null and msg.messageType.trim().equals('PAID')}"
                        class="bubble bubble-card">
                        <p class="paid-card-text" th:text="${msg.content}"></p>
                        <p class="pay-card-title">
                            <span class="pay-card-title-ellipsis" th:text="${msg.orderTitle}"></span> 작업이 진행됩니다.
                        </p>
                        <button type="button" class="btn-notice-action"
                            th:onclick="|location.href='@{/order/info/{id}(id=${msg.orderId})}'|">
                            의뢰서 상세
                        </button>
                    </div>

                    <!-- 작업 완료(최종 승인) -->
                    <div th:if="${msg.messageType != null and msg.messageType.trim().equals('APPROVED')}"
                        class="bubble bubble-card">
                        <p class="pay-card-title">
                            <span th:text="${msg.orderTitle}"></span> 의뢰가 최종 완료되었습니다.
                        </p>
                        <button type="button" class="btn-notice-action"
                            th:onclick="|location.href='@{/order/info/{id}(id=${msg.orderId})}'|">
                            의뢰서 상세
                        </button>
                    </div>

                    <!-- 취소 -->
                    <div th:if="${msg.messageType != null and msg.messageType.trim().equals('CANCELED')}"
                        class="bubble bubble-card cancel-card">
                        <p class="pay-card-title cancel-card-text" th:text="${msg.content}"></p>
                        <button type="button" class="btn-notice-action"
                            th:onclick="|location.href='@{/order/info/{id}(id=${msg.orderId})}'|">
                            의뢰서 상세
                        </button>
                    </div>

                    <!-- 작업물 제출 -->
                    <div th:if="${msg.messageType != null and msg.messageType.trim().equals('SUBMIT')}"
                        class="bubble bubble-card">
                        <p class="pay-card-title">
                            <span class="pay-card-title-ellipsis" th:text="${msg.orderTitle}"></span>에 대한
                            작업물이 도착했습니다
                        </p>
                        <button type="button" class="btn-notice-action"
                            th:onclick="|location.href='@{/order/info/{id}(id=${msg.orderId})}'|">
                            상세보기
                        </button>
                    </div>

                    <!-- 수정 요청 -->
                    <div th:if="${msg.messageType != null and msg.messageType.trim().equals('REVISION_REQUEST')}"
                        class="bubble bubble-card revision-card">
                        <p class="pay-card-title">
                            <span class="pay-card-title-ellipsis" th:text="${msg.orderTitle}"></span>에 대한
                            수정요청이 도착했습니다
                        </p>
                        <button type="button" class="btn-notice-action"
                            th:onclick="|location.href='@{/order/info/{id}(id=${msg.orderId})}'|">
                            의뢰서 상세
                        </button>
                    </div>

                    <!-- 환불 요청 -->
                    <div th:if="${msg.messageType != null and msg.messageType.trim().equals('REFUND_REQUEST')}"
                        class="bubble bubble-card revision-card">
                        <p class="pay-card-title">
                            <span class="pay-card-title-ellipsis" th:text="${msg.orderTitle}"></span>에 대한 환불 요청이 도착했습니다.
                        </p>
                        <p class="timeline-text" th:text="${msg.content}"></p>
                        <button type="button" class="btn-notice-action"
                            th:onclick="|location.href='@{/order/info/{id}(id=${msg.orderId})}'|">
                            의뢰서 상세
                        </button>
                    </div>

                    <!-- 환불 완료 -->
                    <div th:if="${msg.messageType != null and msg.messageType.trim().equals('REFUNDED')}"
                        class="bubble bubble-card cancel-card">
                        <p class="notice-text cancel-card-text" th:text="${msg.content}"></p>
                    </div>

                    <!-- 환불 거절 -->
                    <div th:if="${msg.messageType != null and msg.messageType.trim().equals('REFUND_REJECTED')}"
                        class="bubble bubble-card">
                        <p class="notice-text" th:text="${msg.content}"></p>
                    </div>

                    <!-- 일반 메시지 -->
                    <div th:if="${msg.messageType == null or (!msg.messageType.trim().equals('PAY_REQUEST') 
                                            and !msg.messageType.trim().equals('CANCELED') 
                                            and !msg.messageType.trim().equals('PAID')
                                            and !msg.messageType.trim().equals('NEW_REQUEST')
                                            and !msg.messageType.trim().equals('SUBMIT')
                                            and !msg.messageType.trim().equals('APPROVED')
                                            and !msg.messageType.trim().equals('REVISION_REQUEST') 
                                            and !msg.messageType.trim().equals('REFUND_REQUEST')
                                            and !msg.messageType.trim().equals('REFUNDED')
                                            and !msg.messageType.trim().equals('REFUND_REJECTED'))}" class="bubble">
                        <span th:if="${msg.content != null and !msg.content.isEmpty()}" th:text="${msg.content}"></span>
                        <div th:if="${msg.files != null and !msg.files.isEmpty()}" class="chat-attach-list">
                            <div th:each="file : ${msg.files}">
                                <img th:if="${file.contentType != null and file.contentType.startsWith('image')}"
                                    th:src="${file.filePath}" class="chat-attach-img">
                                <video th:if="${file.contentType != null and file.contentType.startsWith('video')}"
                                    th:src="${file.filePath}" controls class="chat-attach-video"></video>
                            </div>
                        </div>
                    </div>

                    <span th:if="${msg.senderUsername != currentUsername}" class="time"
                        th:text="${#temporals.format(msg.regDate, 'HH:mm')}"></span>
                </div>
            </div>
        </div>

        <form th:action="@{|/order/detail/${room.chatRoomId}/send|}" method="post" class="send-bar"
            enctype="multipart/form-data">
            <input type="file" id="chatFileInput" multiple accept="image/*,video/*" style="display:none;">
            <button type="button" class="btn-attach" onclick="document.getElementById('chatFileInput').click()">
                📎
            </button>

            <div class="input-wrap">
                <input type="text" name="content" placeholder="메시지를 입력하세요" autocomplete="off">
            </div>

            <button type="submit" class="btn-send">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>

        <div id="chatFilePreview" class="file-preview-list"></div>

        <div style="margin-top: 20px; display: flex; gap: 8px;">
            <!-- TODO: 목적지는 나중에 다시 정할 예정 -->
            <button type="button" class="btn-sub" th:onclick="|location.href='@{/order/list}'|">목록으로</button>
        </div>

        <script>
            window.addEventListener('DOMContentLoaded', function () {
                const chatBg = document.querySelector('.chat-bg');
                if (chatBg) {
                    chatBg.scrollTop = chatBg.scrollHeight;
                }
            });

            let chatSelectedFiles = [];

            document.getElementById('chatFileInput').addEventListener('change', function (e) {
                for (const file of e.target.files) {
                    chatSelectedFiles.push(file);
                }
                renderChatFileList();
                e.target.value = '';
            });

            function renderChatFileList() {
                const listEl = document.getElementById('chatFilePreview');
                listEl.innerHTML = '';
                chatSelectedFiles.forEach((file, index) => {
                    const item = document.createElement('div');
                    item.className = 'file-preview-item';
                    item.innerHTML = `
            <span class="file-preview-name">${file.name}</span>
            <button type="button" class="file-preview-remove" data-index="${index}">×</button>
        `;
                    listEl.appendChild(item);
                });

                listEl.querySelectorAll('.file-preview-remove').forEach(btn => {
                    btn.addEventListener('click', function () {
                        chatSelectedFiles.splice(Number(this.dataset.index), 1);
                        renderChatFileList();
                    });
                });
            }

            document.querySelector('form.send-bar').addEventListener('submit', function (e) {
                const dataTransfer = new DataTransfer();
                chatSelectedFiles.forEach(file => dataTransfer.items.add(file));

                const hiddenInput = document.createElement('input');
                hiddenInput.type = 'file';
                hiddenInput.name = 'attachments';
                hiddenInput.multiple = true;
                hiddenInput.style.display = 'none';
                hiddenInput.files = dataTransfer.files;

                this.appendChild(hiddenInput);

                chatSelectedFiles = [];
            });
        </script>
    </main>

    <footer th:replace="~{fragments/common :: footer}"></footer>
</body>

</html>
