<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/common :: head('로그인')}"></head>

<body>
    <div class="auth-page">
        <a th:href="@{/board/list}" class="auth-logo">MAIN</a>

        <div class="auth-card">
            <h2 class="auth-title">로그인</h2>
            <p class="auth-subtitle">다시 만나서 반가워요</p>

            <div th:if="${errorMsg}" class="auth-alert auth-alert-error" th:text="${errorMsg}"></div>
            <div th:if="${logoutMsg}" class="auth-alert auth-alert-info" th:text="${logoutMsg}"></div>

            <form th:action="@{/auth/login}" method="post" class="styled-form">
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" name="username" placeholder="아이디를 입력하세요" required autofocus>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="btn-submit-action">로그인</button>
            </form>

            <div class="auth-switch">
                아직 계정이 없으신가요? <a th:href="@{/account/register}">회원가입</a>
            </div>
        </div>
    </div>
</body>
</html>
